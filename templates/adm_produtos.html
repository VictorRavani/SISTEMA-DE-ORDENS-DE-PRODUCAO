{% extends "base.html" %}
{% block content %}

<body class="background-page-default"></body>
<div class="container-fluid text-black mt-4">
    <div class="row justify-content-center">
        <div class="col-12 col-lg-4"></div>

        <div class="col-6 col-lg-4 d-flex align-items-center justify-content-center">
            <h4>Produtos</h4>
        </div>

        <div class="col-12 col-lg-4 d-flex align-items-center justify-content-end">

            <button type="button" class="btn btn-success mx-1" id="botao-adicionar-produto">
                <i class="fas fa-plus"></i> Adicionar
            </button>

            <button type="button" class="btn btn-primary mx-1" id="botao-editar-produto">
                <i class="fas fa-edit"></i> Editar
            </button>

            <button type="button" class="btn btn-danger mx-1" id="botao-apagar-produto">
                <i class="fas fa-trash"></i> Excluir
            </button>

        </div>
    </div>


    <div class="row justify-content-center mt-4">
        <div class="col-12 col-xl-7 px-1 py-1">
            <div class="card bg-light border-info">
                <div class="card-body">

                    <div class="table-responsive">
                        <table class="table text-black text-center" id="tabela-produtos"></table>
                    </div>

                </div>
            </div>
        </div>
    </div>
    
</div>

<!-- MODAL ADICIONAR PRODUTO -->
<div class="modal fade" id="modal-adicionar-produto">
    <div class="modal-dialog modal-sm">
        <div class="modal-content">

            <div class="modal-header">
                <h5 class="modal-title">Adicionar Produto</h5>

                <button type="button" class="close" data-dismiss="modal">
                    <span>&times;</span>
                </button>
            </div>

            <div class="modal-body">

                <form id="form-adicionar-produto">

                    <div class="form-group">
                        <label>Descrição</label>
                        <input type="text" class="form-control" id="produto-nome" required>
                    </div>

                    <div class="form-group">
                        <label>Código</label>
                        <input type="text" class="form-control" id="produto-codigo" required>
                    </div>

                    <button type="submit" class="btn btn-info w-100 mt-3">
                        Salvar
                    </button>

                </form>

            </div>

        </div>
    </div>
</div>

<!-- MODAL EDITAR PRODUTO -->
<div class="modal fade" id="editar-modal">
    <div class="modal-dialog modal-sm">
        <div class="modal-content">

            <div class="modal-header">
                <h5 class="modal-title">Editar Produto</h5>
                <button type="button" class="close" data-dismiss="modal">
                    <span>&times;</span>
                </button>
            </div>

            <div class="modal-body">

                <form id="editar-formulario">

                    <input type="hidden" id="editar-id">

                    <div class="form-group">
                        <label>Descrição</label>
                        <input type="text" class="form-control" id="editar-nome" required>
                    </div>

                    <div class="form-group">
                        <label>Código</label>
                        <input type="text" class="form-control" id="editar-codigo" required>
                    </div>

                    <button type="submit" class="btn btn-primary w-100 mt-3">
                        Atualizar
                    </button>

                </form>

            </div>

        </div>
    </div>
</div>

{% endblock %}
{% block scripts %}

<script>

var table = $('#tabela-produtos').DataTable({

    ajax: {
        url: '/produtos',
        dataSrc: 'produtos'
    },

    pageLength: 10,
    lengthChange: false,

    language: {
        url: "/static/js/pt-BR.json"
    },

    columns: [
        { data: "nome", title: "Nome" },
        { data: "codigo", title: "Código" }
    ]

});



$('#tabela-produtos').on('click', 'tbody tr', function () {

    var row = table.row(this);
    if (!row.data()) return;

    table.$('tr.tableSelected').removeClass('tableSelected');
    $(this).addClass('tableSelected');

});



/* ABRIR MODAL ADICIONAR */

$('#botao-adicionar-produto').click(function(){

    $('#modal-adicionar-produto').modal('show');

});



/* ADICIONAR PRODUTO */

$('#form-adicionar-produto').submit(function(e){

    e.preventDefault();

    $.post('/produtos', {

        nome: $('#produto-nome').val(),
        codigo: $('#produto-codigo').val()

    }, function(response){

        if(response.success){

            $('#modal-adicionar-produto').modal('hide');

            table.ajax.reload(null,false);

            $('#produto-nome').val('');
            $('#produto-codigo').val('');

            Swal.fire({
                icon: 'success',
                title: 'Operação concluída',
                text: 'Produto cadastrado com sucesso.',
                timer: 1500,
                showConfirmButton: false
            });

        } else {

            Swal.fire({
                icon: 'error',
                title: 'Erro',
                text: response.error
            });

        }

    });

});



/* EDITAR PRODUTO */

$('#botao-editar-produto').click(function(){

    var selectedRow = table.row('.tableSelected');

    if(!selectedRow.data()){
        Swal.fire({
            icon: 'error',
            title: 'Erro',
            text: 'Selecione um produto.'
        });
        return;
    }

    var data = selectedRow.data();

    $('#editar-id').val(data.id);
    $('#editar-nome').val(data.nome);
    $('#editar-codigo').val(data.codigo);

    $('#editar-modal').modal('show');

});



$('#editar-formulario').submit(function(e){

    e.preventDefault();

    $.ajax({

        url: '/produtos',
        type: 'PUT',

        data: {

            id: $('#editar-id').val(),
            nome: $('#editar-nome').val(),
            codigo: $('#editar-codigo').val()

        },

        success: function(response){

            if(response.success){

                $('#editar-modal').modal('hide');

                table.ajax.reload(null,false);

                Swal.fire({
                    icon: 'success',
                    title: 'Operação concluída',
                    text: 'Produto atualizado com sucesso.',
                    timer: 1500,
                    showConfirmButton: false
                });

            } else {

                Swal.fire({
                    icon: 'error',
                    title: 'Erro',
                    text: response.error
                });

            }

        }

    });

});



/* EXCLUIR PRODUTO */

$('#botao-apagar-produto').click(function(){

    var selectedRow = table.row('.tableSelected');

    if(!selectedRow.data()){
        alert("Selecione um produto.");
        return;
    }

    var data = selectedRow.data();

    $.ajax({

        url: '/produtos',
        type: 'DELETE',
        data: { id: data.id },

        success: function(response){

            if(response.success){

                table.ajax.reload(null,false);

                Swal.fire({
                    icon: 'success',
                    title: 'Operação concluída',
                    text: 'Produto excluído com sucesso.',
                    timer: 1500,
                    showConfirmButton: false
                });

            } else {

                Swal.fire({
                    icon: 'error',
                    title: 'Erro',
                    text: response.error
                });

            }

        }

    });

});


</script>

{% endblock %}
